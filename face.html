<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>善財童子五十三參．面相觀照 — 寶嚴禪寺</title>
<style>
  :root{
    --navy:#0a0e24; --navy2:#131a40; --navy3:#1d2552;
    --gold:#d4af37; --gold-light:#f3e0a3; --gold-deep:#9c7a1e;
    --ink:#ede6cf; --ink-soft:#b9b08f;
    --panel:rgba(18,24,58,.78); --panel-line:rgba(212,175,55,.45);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Serif TC","Songti TC","STSong","PMingLiU",serif;
    color:var(--ink);
    background:radial-gradient(ellipse at 50% -10%, #28306e 0%, var(--navy2) 34%, var(--navy) 72%, #05070f 100%) fixed;
    min-height:100%; display:flex; flex-direction:column; align-items:center;
    padding:24px 16px 52px; position:relative; overflow-x:hidden;
  }
  /* 星空 + 金塵 */
  .stars{position:fixed; inset:0; pointer-events:none; z-index:0;}
  .stars i{position:absolute; background:#fff; border-radius:50%; opacity:.8; animation:tw 3s ease-in-out infinite;}
  @keyframes tw{0%,100%{opacity:.15;}50%{opacity:.9;}}
  .dust{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
  .dust span{position:absolute; bottom:-20px; border-radius:50%;
    background:radial-gradient(circle,var(--gold-light),transparent 70%); opacity:.5; animation:rise linear infinite;}
  @keyframes rise{to{transform:translateY(-110vh) translateX(28px); opacity:0;}}

  .wrap{width:100%; max-width:600px; position:relative; z-index:1; text-align:center;}
  header{margin-bottom:8px;}
  .temple{color:var(--gold-light); letter-spacing:.55em; font-size:15px; text-indent:.55em; margin-bottom:14px; text-shadow:0 0 14px rgba(212,175,55,.5);}
  h1{color:#fff; font-size:30px; font-weight:700; line-height:1.5; text-shadow:0 0 20px rgba(120,140,255,.4);}
  h1 .grad{background:linear-gradient(90deg,#f3e0a3,#d4af37 50%,#f3e0a3); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  h1 .sm{display:block; font-size:15.5px; color:var(--gold-light); letter-spacing:.32em; margin-top:9px; font-weight:400; -webkit-text-fill-color:initial;}
  .subtitle{color:var(--ink-soft); font-size:14px; margin-top:14px; line-height:1.85;}
  .back-link{display:inline-flex; align-items:center; gap:6px; margin-top:14px; text-decoration:none;
    color:var(--gold-light); font-size:13.5px; font-weight:700; letter-spacing:.12em;
    padding:8px 20px; border-radius:28px; border:1.5px solid var(--gold); background:rgba(212,175,55,.12);
    box-shadow:0 0 14px rgba(212,175,55,.22); transition:background .15s, transform .15s;}
  .back-link:hover{background:rgba(212,175,55,.24); transform:translateY(-2px);}

  /* 觀照台 */
  .viewer{
    position:relative; width:300px; height:360px; margin:26px auto 6px; max-width:80vw;
    border-radius:18px; overflow:hidden;
    background:radial-gradient(circle at 50% 40%,#10173c,#070b1e);
    border:1.5px solid var(--panel-line);
    box-shadow:0 16px 40px rgba(0,0,0,.55), 0 0 26px rgba(212,175,55,.28), inset 0 0 30px rgba(40,55,120,.35);
  }
  .viewer video, .viewer img, .viewer canvas.shot{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none;}
  .viewer.cam video{display:block;}
  .viewer.shot canvas.shot{display:block;}
  .placeholder{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--gold-light); gap:14px; padding:20px; text-align:center;}
  .viewer.cam .placeholder, .viewer.shot .placeholder{display:none;}
  .placeholder svg{width:74px; height:74px; opacity:.9; filter:drop-shadow(0 0 8px rgba(212,175,55,.5));}
  .placeholder p{font-size:14px; line-height:1.8; opacity:.85;}

  /* 三停五嶽導引線 */
  .guide{position:absolute; inset:0; pointer-events:none; display:none;}
  .viewer.cam .guide, .viewer.shot .guide{display:block;}
  .guide line, .guide circle, .guide ellipse{stroke:var(--gold-light); fill:none; opacity:.6; filter:drop-shadow(0 0 3px rgba(212,175,55,.5));}
  .guide .lbl{fill:var(--gold-light); font-size:9px; opacity:.9; letter-spacing:.1em;}

  /* 掃描動畫 */
  .scan{position:absolute; left:0; right:0; height:3px; top:0;
    background:linear-gradient(90deg,transparent,var(--gold-light),transparent);
    box-shadow:0 0 16px 4px rgba(243,224,163,.8); display:none;}
  .viewer.analyzing .scan{display:block; animation:scan 1.4s ease-in-out infinite;}
  @keyframes scan{0%{top:0;}50%{top:calc(100% - 3px);}100%{top:0;}}
  .viewer.analyzing .guide{opacity:.95;}
  .analyzing-tip{color:var(--gold-light); font-size:14px; letter-spacing:.2em; margin-top:14px; display:none; animation:blink 1.4s infinite;}
  .analyzing-tip.show{display:block;}
  @keyframes blink{50%{opacity:.4;}}

  /* 按鈕 */
  .actions{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:18px;}
  .btn{appearance:none; border:none; cursor:pointer; font-family:inherit;
    background:linear-gradient(180deg,var(--gold-light),var(--gold) 55%,var(--gold-deep));
    color:#3a2a05; font-weight:700; font-size:16px; letter-spacing:.22em; text-indent:.22em; padding:13px 32px;
    border-radius:40px; box-shadow:0 6px 20px rgba(0,0,0,.45), 0 0 18px rgba(212,175,55,.3), inset 0 1px 0 #fff6d8;
    transition:transform .15s; border:1.5px solid #fff2cf;}
  .btn:hover{transform:translateY(-2px);}
  .btn:active{transform:translateY(1px);}
  .btn[disabled]{opacity:.5; cursor:default; transform:none;}
  .btn.ghost{background:transparent; color:var(--gold-light); border:1.5px solid var(--gold); box-shadow:none; font-size:14.5px; padding:11px 26px;}
  .btn.ghost:hover{background:rgba(212,175,55,.14);}
  .btn.big{font-size:18px; padding:14px 44px; letter-spacing:.28em; text-indent:.28em;}

  /* 結果面板（與抽籤頁一致的深色玻璃） */
  .card-scene{width:100%; max-width:460px; margin:20px auto 0; display:none;}
  .card-scene.show{display:block; animation:fadeUp .6s ease;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(16px);}to{opacity:1; transform:translateY(0);}}
  .card{position:relative; width:100%; border-radius:16px;
    background:var(--panel); border:1.5px solid var(--panel-line);
    box-shadow:0 16px 40px rgba(0,0,0,.5), inset 0 0 30px rgba(40,55,120,.3);
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    padding:24px 22px 26px; text-align:center;}
  .badge{display:inline-block; background:linear-gradient(180deg,#e8c84e,#b8901f); color:#2a1d02; font-size:13px; letter-spacing:.3em; text-indent:.3em; padding:6px 22px; border-radius:22px; font-weight:700; border:1px solid var(--gold);}
  .no{color:var(--ink-soft); font-size:13.5px; letter-spacing:.12em; margin:12px 0 2px;}
  .no b{color:var(--gold-light); font-size:16px;}

  /* 善知識畫卡（與抽籤頁同樣完整呈現） */
  .sign-card{width:220px; max-width:66%; margin:14px auto 4px; border-radius:12px; overflow:hidden;
    border:1.5px solid var(--gold); background:#0c1024;
    box-shadow:0 14px 34px rgba(0,0,0,.55), 0 0 22px rgba(212,175,55,.3);}
  .sign-card img{width:100%; display:block; aspect-ratio:1024/1536; object-fit:contain; background:#0c1024;}

  .name{font-size:26px; font-weight:700; margin-top:10px; letter-spacing:.05em;
    background:linear-gradient(90deg,#f3e0a3,#d4af37 50%,#f3e0a3); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; text-shadow:0 0 18px rgba(212,175,55,.25);}
  .role{font-size:14px; color:var(--ink-soft); margin-top:6px;}

  /* 三圓圈法門關鍵詞（與抽籤頁一致） */
  .keys-t{color:var(--gold); font-size:12px; letter-spacing:.3em; margin-top:14px; opacity:.85;}
  .keys{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:10px;}
  .keys .k{font-size:13px; color:var(--gold-light); background:rgba(212,175,55,.12);
    border:1px solid rgba(212,175,55,.5); border-radius:20px; padding:5px 14px; letter-spacing:.08em;}

  .scores{display:flex; justify-content:space-around; gap:9px; margin:16px auto 0; max-width:380px;}
  .score{flex:1; background:rgba(8,12,30,.55); border:1px solid rgba(212,175,55,.28); border-radius:10px; padding:11px 4px;}
  .score .sv{font-size:24px; font-weight:700; color:var(--gold-light); text-shadow:0 0 12px rgba(212,175,55,.35);}
  .score .sk{font-size:12px; color:var(--ink-soft); letter-spacing:.12em; margin-top:3px;}

  .yourface{width:74px; height:74px; margin:16px auto 0; border-radius:50%; overflow:hidden; border:1.5px solid rgba(212,175,55,.6); background:#0c1024; box-shadow:0 3px 10px rgba(0,0,0,.4);}
  .yourface img{width:100%; height:100%; object-fit:cover;}
  .yourface-cap{font-size:11.5px; color:var(--ink-soft); letter-spacing:.18em; margin-top:6px;}

  .section{margin:14px auto 0; max-width:382px; text-align:left;}
  .section h3{font-size:13.5px; color:var(--gold); letter-spacing:.24em; border-bottom:1px solid rgba(212,175,55,.25); padding-bottom:8px; margin-bottom:11px; text-align:center;}
  .trait{display:flex; align-items:flex-start; gap:10px; font-size:14px; line-height:1.7; margin-bottom:10px;}
  .trait .t-k{flex:0 0 56px; color:var(--gold-light); font-weight:700;}
  .trait .t-v{flex:1; color:var(--ink);}
  .trait .bar{height:6px; border-radius:4px; background:rgba(212,175,55,.16); flex:0 0 56px; margin-top:7px; overflow:hidden; position:relative;}
  .trait .bar i{position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:4px; box-shadow:0 0 8px rgba(212,175,55,.6);}

  .poem{margin:16px auto 4px; max-width:340px; padding:14px 8px; border-top:1px solid rgba(212,175,55,.25); border-bottom:1px solid rgba(212,175,55,.25);}
  .poem div{font-size:21px; color:var(--gold-light); letter-spacing:.32em; text-indent:.32em; line-height:2; font-weight:600; text-shadow:0 0 12px rgba(212,175,55,.3);}
  .gate{margin:14px auto 0; max-width:382px; text-align:left; font-size:13.5px; line-height:1.7; color:var(--ink);}
  .gate .gk{color:var(--gold); font-weight:700; letter-spacing:.1em;}
  .verse{margin:14px auto 0; max-width:382px; background:rgba(8,12,30,.5); border:1px solid rgba(212,175,55,.22); border-radius:10px; padding:14px 16px; font-size:15px; line-height:1.95; color:var(--ink); text-align:left;}
  .verse .vt{color:var(--gold); font-weight:700; letter-spacing:.22em; font-size:13.5px; display:block; margin-bottom:6px;}
  .source{margin-top:15px;}
  .source a{display:inline-flex; align-items:center; gap:8px; text-decoration:none; color:var(--gold-light);
    background:rgba(212,175,55,.12); border:1px solid var(--gold); border-radius:30px; padding:9px 18px; font-size:13.5px; transition:background .15s;}
  .source a:hover{background:rgba(212,175,55,.25);}
  .source .yt{display:inline-block; width:20px; height:14px; background:#c00; border-radius:4px; position:relative;}
  .source .yt::after{content:""; position:absolute; top:3px; left:7px; border-left:7px solid #fff; border-top:4px solid transparent; border-bottom:4px solid transparent;}

  footer{margin-top:30px; color:var(--ink-soft); opacity:.7; font-size:12px; line-height:1.9; text-align:center; max-width:520px;}
  .err{color:#ffd9a8; font-size:13px; margin-top:10px; min-height:18px;}

  @media(max-width:480px){h1{font-size:24px;} .viewer{width:88vw; height:106vw; max-width:300px; max-height:360px;} .poem div{font-size:19px;}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="dust" id="dust"></div>

<div class="wrap">
  <header>
    <div class="temple">寶 嚴 禪 寺</div>
    <h1><span class="grad">善財童子五十三參</span>
      <span class="sm">面 相 觀 照 ． 善 知 識 相 應</span>
    </h1>
    <p class="subtitle">
      善財童子遍訪五十三位善知識，學菩薩萬行。<br>
      請以鏡頭觀照或上傳照片，依面相三停五官之氣象，<br>與一位善知識相應，得其法門指引。
    </p>
    <a class="back-link" href="index.html">↩ 返回「抽籤」· 善知識卡</a>
  </header>

  <div class="viewer" id="viewer">
    <video id="video" playsinline muted></video>
    <canvas class="shot" id="shot"></canvas>
    <div class="placeholder">
      <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="32" cy="26" r="14"/>
        <path d="M12 54c2-9 10-14 20-14s18 5 20 14"/>
        <path d="M26 24c1.5 1.5 4.5 1.5 6 0M38 24c1.5 1.5 4.5 1.5 6 0" stroke-width="2.4"/>
      </svg>
      <p>開啟鏡頭，或上傳一張正面清晰的相片<br>讓善知識為您觀照面相</p>
    </div>
    <svg class="guide" id="guide" viewBox="0 0 300 360" preserveAspectRatio="none">
      <ellipse cx="150" cy="180" rx="92" ry="120"/>
      <line x1="58" y1="120" x2="242" y2="120"/>
      <line x1="58" y1="210" x2="242" y2="210"/>
      <line x1="150" y1="60" x2="150" y2="300"/>
      <circle cx="150" cy="150" r="5"/>
      <circle cx="105" cy="150" r="4"/><circle cx="195" cy="150" r="4"/>
      <circle cx="150" cy="240" r="5"/>
      <text class="lbl" x="246" y="92">上停 · 智</text>
      <text class="lbl" x="246" y="170">中停 · 業</text>
      <text class="lbl" x="246" y="262">下停 · 福</text>
    </svg>
    <div class="scan"></div>
  </div>
  <div class="analyzing-tip" id="aTip">善知識凝神觀照中…請稍候</div>
  <div class="err" id="err"></div>

  <div class="actions" id="setupActions">
    <button class="btn" id="camBtn">開啟鏡頭</button>
    <button class="btn ghost" id="uploadBtn">上傳／拍照</button>
    <input type="file" id="file" accept="image/*" style="display:none;">
  </div>
  <div class="actions" id="goActions" style="display:none;">
    <button class="btn big" id="readBtn">觀　照　面　相</button>
    <button class="btn ghost" id="resetBtn">重新選擇</button>
  </div>

  <div class="card-scene" id="scene"></div>

  <div class="actions" id="againActions" style="display:none; margin-top:18px;">
    <button class="btn ghost" id="againBtn">再觀照一次</button>
  </div>

  <footer>
    本程式依《大方廣佛華嚴經‧入法界品》五十三參與傳統面相「三停五官」之說編成，<br>
    為勸善、省思之方便遊戲，非命理斷定，亦不蒐集或上傳您的影像（全程於本機運算）。<br>
    © 寶嚴禪寺　Baoyan Chan Monastery
  </footer>
</div>

<script src="signs.js"></script>
<script>
/* ============ 面相文案庫 ============ */
const READINGS = {
  上停:{
    high:"上停（天庭）開闊明亮，主智慧通達、思慮高遠，少年運佳、得長上提攜。",
    mid:"上停（天庭）平正勻稱，心思細密、學習力強，凡事三思而後行。",
    low:"上停（天庭）內斂含蓄，沉潛務實、不尚空談，宜多向智者請益以開新局。"
  },
  中停:{
    high:"中停（眉眼鼻顴）飽滿有神，主魄力與行動力強、事業心旺，中年得勢、人緣廣聚。",
    mid:"中停氣象端正，待人誠懇、進退有節，是能受人信賴的中流砥柱。",
    low:"中停柔和謙退，性情溫厚不爭，宜主動把握良機、勿過於退讓。"
  },
  下停:{
    high:"下停（口頷地閣）方圓豐隆，主福德深厚、晚運綿長，心寬能容、晚景安樂。",
    mid:"下停勻稱有肉，重情重義、持家有道，福報隨善行而日增。",
    low:"下停清秀俐落，律己甚嚴、做事乾淨，宜多寬待自己與他人以養福。"
  },
  氣色:{
    high:"氣色紅潤光潔，精神煥發，近期運勢上揚、貴人在側。",
    mid:"氣色溫潤平和，身心安泰，宜守成積德、靜待時機。",
    low:"氣色沉靜內斂，宜調養作息、舒展心神，運勢將漸入佳境。"
  },
  神采:{
    high:"五官輪廓分明、神采奕奕，眼神專注有定見，氣場出眾、令人印象深刻。",
    mid:"五官清朗、神情安定，溫和而不失主見，是可深交之相。",
    low:"神情柔和含蓄，內斂沉穩、深藏不露，真才實學待時而顯。"
  },
  端正:{
    high:"面相端正勻稱、左右調和，主性情中正、處事公允，一生少是非。",
    mid:"五官協調自然，剛柔並濟，能在原則與圓融之間取得平衡。",
    low:"面相個性鮮明、別具神韻，主才情獨具、不隨流俗，宜善用個人特質。"
  }
};
const STOP_FOCUS = {
  上停:"你的格局偏重「智慧與謀略」——以思考與遠見取勝，宜走需要學識、規劃、創意之路。",
  中停:"你的格局偏重「事業與行動」——魄力與人際是你的本錢，宜在能發揮領導與開創之處一展長才。",
  下停:"你的格局偏重「福德與守成」——以厚德與包容聚人聚財，晚運尤佳，宜廣積善緣、穩中求進。"
};

/* ============ DOM ============ */
const viewer=document.getElementById("viewer");
const video=document.getElementById("video");
const shot=document.getElementById("shot");
const fileInput=document.getElementById("file");
const camBtn=document.getElementById("camBtn");
const uploadBtn=document.getElementById("uploadBtn");
const readBtn=document.getElementById("readBtn");
const resetBtn=document.getElementById("resetBtn");
const againBtn=document.getElementById("againBtn");
const setupActions=document.getElementById("setupActions");
const goActions=document.getElementById("goActions");
const againActions=document.getElementById("againActions");
const scene=document.getElementById("scene");
const errEl=document.getElementById("err");
const aTip=document.getElementById("aTip");

let stream=null, mode=null, uploadedImg=null;
function setErr(m){ errEl.textContent=m||""; }

function isInAppBrowser(){
  const ua=navigator.userAgent||"";
  return /(FBAN|FBAV|Instagram|Line\/|MicroMessenger|Twitter|TikTok|; wv\))/i.test(ua);
}

async function openCam(){
  setErr("");
  // 安全環境檢查（http、file:// 無法使用相機）
  if(!window.isSecureContext){
    setErr("開啟相機需在安全連線（https）下使用。請改用下方「上傳照片」（可直接拍照）。");
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    if(isInAppBrowser()){
      setErr("偵測到您是在 App 內建瀏覽器（LINE／FB／IG）開啟，相機常被封鎖。請按右上角「⋯」選「用外部瀏覽器開啟」（Safari／Chrome），或改用下方「上傳照片」直接拍照。");
    }else{
      setErr("此瀏覽器不支援開啟相機，請改用下方「上傳照片」（可直接拍照）。");
    }
    return;
  }
  camBtn.disabled=true; const camLabel=camBtn.textContent; camBtn.textContent="開啟中…";
  try{
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}, audio:false});
    }catch(e1){
      // 後援：不限定前/後鏡頭
      stream=await navigator.mediaDevices.getUserMedia({video:true, audio:false});
    }
    video.srcObject=stream; await video.play();
    mode="cam"; viewer.className="viewer cam";
    setupActions.style.display="none"; goActions.style.display="flex";
    scene.classList.remove("show"); againActions.style.display="none";
  }catch(e){
    const n=(e&&e.name)||"";
    let msg;
    if(n==="NotAllowedError"||n==="SecurityError"||n==="PermissionDeniedError"){
      msg="相機權限被拒。請點網址列旁的相機圖示（或瀏覽器設定）允許相機後再試；也可改用下方「上傳照片」直接拍照。";
    }else if(n==="NotFoundError"||n==="DevicesNotFoundError"||n==="OverconstrainedError"){
      msg="找不到可用的相機。請改用下方「上傳照片」（可直接拍照）。";
    }else if(n==="NotReadableError"||n==="TrackStartError"){
      msg="相機正被其他程式占用，請先關閉其他相機程式再試，或改用「上傳照片」。";
    }else if(isInAppBrowser()){
      msg="App 內建瀏覽器常封鎖相機。請用 Safari／Chrome 開啟本頁，或改用下方「上傳照片」直接拍照。";
    }else{
      msg="無法開啟相機（"+(n||"未知錯誤")+"）。請改用下方「上傳照片」（可直接拍照）。";
    }
    setErr(msg);
  }finally{
    camBtn.disabled=false; camBtn.textContent=camLabel;
  }
}

uploadBtn.addEventListener("click",()=>fileInput.click());
fileInput.addEventListener("change",e=>{
  const f=e.target.files&&e.target.files[0]; if(!f) return;
  setErr("");
  const url=URL.createObjectURL(f); const img=new Image();
  img.onload=()=>{
    uploadedImg=img; drawToShot(img);
    mode="shot"; viewer.className="viewer shot"; stopCam();
    setupActions.style.display="none"; goActions.style.display="flex";
    scene.classList.remove("show"); againActions.style.display="none";
    URL.revokeObjectURL(url);
  };
  img.onerror=()=>{ setErr("照片讀取失敗，請換一張試試。"); URL.revokeObjectURL(url); };
  img.src=url;
});

function drawToShot(src){
  const W=300,H=360; shot.width=W; shot.height=H;
  const c=shot.getContext("2d");
  const sw=src.naturalWidth||src.videoWidth, sh=src.naturalHeight||src.videoHeight;
  const scale=Math.max(W/sw,H/sh); const dw=sw*scale, dh=sh*scale;
  c.drawImage(src,(W-dw)/2,(H-dh)/2,dw,dh);
}
function stopCam(){ if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; } }

function resetAll(){
  stopCam(); mode=null; uploadedImg=null;
  viewer.className="viewer";
  setupActions.style.display="flex"; goActions.style.display="none";
  againActions.style.display="none"; scene.classList.remove("show"); setErr("");
}

/* ============ 影像特徵分析 ============ */
function grabSourceCanvas(){ if(mode==="cam"){ drawToShot(video); } return shot; }

function analyzeFace(canvas){
  const W=canvas.width, H=canvas.height, ctx=canvas.getContext("2d");
  const fx=Math.round(W*0.18), fy=Math.round(H*0.10), fw=Math.round(W*0.64), fh=Math.round(H*0.80);
  const data=ctx.getImageData(fx,fy,fw,fh).data;
  let lum=[0,0,0], cnt=[0,0,0];
  let sumR=0,sumG=0,sumB=0,sumL=0,sumL2=0,N=0;
  let leftL=0,leftN=0,rightL=0,rightN=0;
  let hash=2166136261>>>0;
  for(let y=0;y<fh;y++){
    const band = y< fh/3 ? 0 : (y< fh*2/3 ? 1 : 2);
    for(let x=0;x<fw;x++){
      const i=(y*fw+x)*4; const r=data[i],g=data[i+1],b=data[i+2];
      const L=0.299*r+0.587*g+0.114*b;
      lum[band]+=L; cnt[band]++;
      sumR+=r; sumG+=g; sumB+=b; sumL+=L; sumL2+=L*L; N++;
      if(x<fw/2){ leftL+=L; leftN++; } else { rightL+=L; rightN++; }
      if((x%7===0)&&(y%7===0)){
        hash ^= (r&0xF8)|((g&0xF8)<<8)|((b&0xF8)<<16);
        hash = Math.imul(hash,16777619)>>>0;
      }
    }
  }
  const avgL=sumL/N;
  const u=lum[0]/cnt[0], m=lum[1]/cnt[1], d=lum[2]/cnt[2];
  const std=Math.sqrt(Math.max(0,sumL2/N-avgL*avgL));
  const warmth=(sumR-sumB)/N;
  const sym=1-Math.min(1,Math.abs(leftL/leftN-rightL/rightN)/Math.max(1,avgL));
  const valid = N>0 && avgL>14 && avgL<248 && std>6;
  return {avgL,u,m,d,std,warmth,sym,hash:hash>>>0,valid};
}

function tier(v,lo,hi){ return v<lo?"low":(v>hi?"high":"mid"); }
function pct(level){ return level==="high"?86:(level==="mid"?60:38); }

function buildReport(f){
  const stops={上停:f.u,中停:f.m,下停:f.d};
  const maxStop=Object.keys(stops).reduce((a,b)=>stops[a]>=stops[b]?a:b);
  const lv={
    上停:tier(f.u,f.avgL-10,f.avgL+10),
    中停:tier(f.m,f.avgL-10,f.avgL+10),
    下停:tier(f.d,f.avgL-10,f.avgL+10),
    氣色:tier(f.warmth,18,40),
    神采:tier(f.std,34,52),
    端正:tier(f.sym,0.86,0.95)
  };
  const clamp=(x)=>Math.max(58,Math.min(98,Math.round(x)));
  const wisdom = clamp(62 + (f.u-f.avgL)*1.2 + (f.std-40)*0.4 + (f.hash%7));
  const career = clamp(62 + (f.m-f.avgL)*1.2 + (f.warmth-28)*0.5 + (f.hash%5));
  const fortune= clamp(64 + (f.d-f.avgL)*1.2 + f.sym*14 + (f.hash%6));
  const sign=SIGNS[f.hash % SIGNS.length];
  return {lv,maxStop,wisdom,career,fortune,sign};
}

/* ============ 觀照流程 ============ */
function read(){
  if(!mode){ setErr("請先開啟鏡頭或上傳照片。"); return; }
  setErr("");
  const canvas=grabSourceCanvas();
  if(mode==="cam"){ stopCam(); mode="shot"; }
  viewer.className="viewer shot analyzing";
  aTip.classList.add("show"); goActions.style.display="none";
  setTimeout(()=>{
    const f=analyzeFace(canvas);
    viewer.className="viewer shot"; aTip.classList.remove("show");
    if(!f.valid){
      setErr("畫面太暗或看不清面容，請在光線充足處、正面清晰再試一次。");
      goActions.style.display="flex"; return;
    }
    const rep=buildReport(f);
    showResult(rep,canvas);
    againActions.style.display="flex";
  }, 1800);
}

function bar(level){ return `<span class="bar"><i style="width:${pct(level)}%"></i></span>`; }
function imgPath(n){ return "images/"+String(n).padStart(2,"0")+".png"; }

function showResult(rep,canvas){
  const s=rep.sign;
  const faceURL=canvas.toDataURL("image/jpeg",0.8);
  const traits=["上停","中停","下停","氣色","神采","端正"];
  const traitHTML=traits.map(k=>{
    const lv=rep.lv[k];
    return `<div class="trait"><span class="t-k">${k}</span><span class="t-v">${READINGS[k][lv]}</span>${bar(lv)}</div>`;
  }).join("");
  const keysHTML=(s.keys||[]).map(k=>`<span class="k">${k}</span>`).join("");
  const src = (typeof sourceLink==="function") ? sourceLink(s) : null;
  const poemHTML = s.poem ? `<div class="poem"><div>${s.poem[0]}</div><div>${s.poem[1]}</div></div>` : "";
  const srcHTML = src ? `<div class="source"><a href="${src.url}" target="_blank" rel="noopener"><span class="yt"></span>聆聽出處 · ${src.label}</a></div>` : "";
  scene.innerHTML=`
    <div class="card">
      <div class="badge">面相觀照</div>
      <div class="no">與第 <b>${s.n}</b> 參善知識相應　／　共五十三參</div>
      <div class="sign-card"><img src="${imgPath(s.n)}" alt="${s.name}"></div>
      <div class="name">${s.name}</div>
      <div class="role">參訪：${s.place||s.role||""}</div>
      ${keysHTML?`<div class="keys-t">獨 特 法 門</div><div class="keys">${keysHTML}</div>`:""}

      <div class="yourface"><img src="${faceURL}" alt="您的面相"></div>
      <div class="yourface-cap">您 的 面 相</div>
      <div class="scores">
        <div class="score"><div class="sv">${rep.wisdom}</div><div class="sk">智慧</div></div>
        <div class="score"><div class="sv">${rep.career}</div><div class="sk">事業</div></div>
        <div class="score"><div class="sv">${rep.fortune}</div><div class="sk">福德</div></div>
      </div>
      <div class="section">
        <h3>面　相　觀　照</h3>
        ${traitHTML}
        <div class="trait" style="margin-top:4px"><span class="t-k">總評</span><span class="t-v">${STOP_FOCUS[rep.maxStop]}</span></div>
      </div>

      ${poemHTML}
      <div class="gate"><span class="gk">所應法門　</span>${s.gate}</div>
      <div class="verse"><span class="vt">善知識開示</span>${s.jie||s.msg||""}</div>
      ${srcHTML}
    </div>`;
  scene.classList.add("show");
  scene.scrollIntoView({behavior:"smooth",block:"nearest"});
}
