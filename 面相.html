<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>善財童子五十三參．面相觀照 — 寶嚴禪寺</title>
<style>
  :root{
    --red:#7a1416; --red-deep:#5a0d0f; --red-light:#9c2a2c;
    --gold:#c9a227; --gold-light:#e8cf7a; --gold-deep:#9c7a14;
    --paper:#f7f0e1; --paper-line:#e7dcc2;
    --ink:#2b211a; --ink-soft:#5c4d3d;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Serif TC","Songti TC","STSong","PMingLiU",serif;
    color:var(--ink);
    background:radial-gradient(circle at 50% -10%, #93292b 0%, var(--red) 38%, var(--red-deep) 100%);
    min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:24px 16px 48px; position:relative; overflow-x:hidden;
  }
  .bg-orbs{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
  .bg-orbs span{
    position:absolute; bottom:-20px; width:8px; height:8px; border-radius:50%;
    background:radial-gradient(circle,var(--gold-light),transparent 70%);
    opacity:.5; animation:rise linear infinite;
  }
  @keyframes rise{to{transform:translateY(-110vh) translateX(30px); opacity:0;}}

  .wrap{width:100%; max-width:560px; position:relative; z-index:1; text-align:center;}
  header{margin-bottom:6px;}
  .temple{color:var(--gold-light); letter-spacing:.5em; font-size:15px; text-indent:.5em; margin-bottom:14px;}
  h1{color:var(--paper); font-size:30px; font-weight:700; line-height:1.5; text-shadow:0 2px 10px rgba(0,0,0,.4);}
  h1 .sm{display:block; font-size:16px; color:var(--gold-light); letter-spacing:.3em; margin-top:8px; font-weight:400;}
  .subtitle{color:#f3dca0; opacity:.85; font-size:14px; margin-top:14px; line-height:1.8;}
  .back-link{display:inline-flex; align-items:center; gap:6px; margin-top:14px; text-decoration:none;
    color:var(--gold-light); font-size:13.5px; font-weight:700; letter-spacing:.12em;
    padding:8px 20px; border-radius:28px; border:1.5px solid var(--gold); background:rgba(201,162,39,.12);
    transition:background .15s, transform .15s;}
  .back-link:hover{background:rgba(201,162,39,.24); transform:translateY(-2px);}

  /* 觀照台 */
  .viewer{
    position:relative; width:300px; height:360px; margin:26px auto 6px;
    border-radius:18px; overflow:hidden;
    background:linear-gradient(180deg,#2a1416,#160a0b);
    border:2px solid var(--gold); box-shadow:0 14px 34px rgba(0,0,0,.5), inset 0 0 0 5px rgba(201,162,39,.12);
  }
  .viewer video, .viewer img, .viewer canvas.shot{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none;
  }
  .viewer.cam video{display:block;}
  .viewer.shot canvas.shot{display:block;}
  .placeholder{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--gold-light); gap:14px; padding:20px; text-align:center;
  }
  .viewer.cam .placeholder, .viewer.shot .placeholder{display:none;}
  .placeholder svg{width:74px; height:74px; opacity:.85;}
  .placeholder p{font-size:14px; line-height:1.8; opacity:.8;}

  /* 面相導引線（三停五嶽） */
  .guide{position:absolute; inset:0; pointer-events:none; display:none;}
  .viewer.cam .guide, .viewer.shot .guide{display:block;}
  .guide line, .guide circle, .guide ellipse{stroke:var(--gold-light); fill:none; opacity:.55;}
  .guide .lbl{fill:var(--gold-light); font-size:9px; opacity:.85; letter-spacing:.1em;}

  /* 掃描動畫 */
  .scan{position:absolute; left:0; right:0; height:3px; top:0;
    background:linear-gradient(90deg,transparent,var(--gold-light),transparent);
    box-shadow:0 0 14px 3px rgba(232,207,122,.7); display:none;}
  .viewer.analyzing .scan{display:block; animation:scan 1.4s ease-in-out infinite;}
  @keyframes scan{0%{top:0;}50%{top:calc(100% - 3px);}100%{top:0;}}
  .viewer.analyzing .guide{opacity:.9;}
  .analyzing-tip{color:var(--gold-light); font-size:14px; letter-spacing:.2em; margin-top:14px; display:none; animation:blink 1.4s infinite;}
  .analyzing-tip.show{display:block;}
  @keyframes blink{50%{opacity:.4;}}

  /* 按鈕 */
  .actions{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:18px;}
  .btn{
    appearance:none; border:none; cursor:pointer; font-family:inherit;
    background:linear-gradient(180deg,var(--gold-light),var(--gold) 55%,var(--gold-deep));
    color:#4a2c08; font-weight:700; font-size:16px; letter-spacing:.2em; text-indent:.2em;
    padding:13px 30px; border-radius:40px;
    box-shadow:0 6px 18px rgba(0,0,0,.35), inset 0 1px 0 #fff6d8;
    transition:transform .15s, box-shadow .15s; border:1.5px solid #fff2cf;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn:active{transform:translateY(1px);}
  .btn[disabled]{opacity:.45; cursor:default; transform:none;}
  .btn.ghost{background:transparent; color:var(--gold-light); border:1.5px solid var(--gold); box-shadow:none; font-size:14.5px; padding:11px 24px;}
  .btn.ghost:hover{background:rgba(201,162,39,.12);}
  .btn.big{font-size:18px; padding:14px 44px;}

  /* 結果卡 */
  .card-scene{width:100%; max-width:460px; margin:22px auto 0; display:none;}
  .card-scene.show{display:block; animation:cardIn .7s cubic-bezier(.2,.9,.25,1.2);}
  @keyframes cardIn{0%{opacity:0; transform:translateY(24px) scale(.96);}100%{opacity:1; transform:none;}}
  .card{
    position:relative; width:100%; border-radius:16px;
    background:linear-gradient(180deg,#fffaf0,var(--paper));
    border:2px solid var(--gold);
    box-shadow:0 18px 40px rgba(0,0,0,.5), inset 0 0 0 6px rgba(201,162,39,.12);
    padding:26px 24px 28px; text-align:center;
  }
  .card::before{content:""; position:absolute; inset:8px; border:1px solid var(--paper-line); border-radius:10px; pointer-events:none;}
  .badge{display:inline-block; background:var(--red); color:var(--gold-light); font-size:13px; letter-spacing:.3em; text-indent:.3em; padding:5px 18px; border-radius:20px; border:1px solid var(--gold); margin-bottom:4px;}
  .no{color:var(--ink-soft); font-size:13.5px; letter-spacing:.2em; margin:10px 0 2px;}
  .no b{color:var(--red); font-size:17px;}
  .face-shot{width:96px; height:96px; margin:10px auto 4px; border-radius:50%; overflow:hidden; border:2px solid var(--gold); box-shadow:0 4px 12px rgba(0,0,0,.18); background:#f0e6cf;}
  .face-shot img{width:100%; height:100%; object-fit:cover;}
  .name{font-size:27px; font-weight:700; color:var(--red-deep); margin-top:6px; letter-spacing:.05em;}
  .role{font-size:14px; color:var(--ink-soft); margin-top:6px;}

  .section{margin:16px auto 0; max-width:380px; text-align:left;}
  .section h3{font-size:14px; color:var(--gold-deep); letter-spacing:.2em; border-bottom:1px dashed var(--paper-line); padding-bottom:7px; margin-bottom:10px;}
  .trait{display:flex; align-items:flex-start; gap:10px; font-size:14px; line-height:1.7; margin-bottom:9px;}
  .trait .t-k{flex:0 0 58px; color:var(--red); font-weight:700;}
  .trait .t-v{flex:1; color:var(--ink);}
  .trait .bar{height:6px; border-radius:4px; background:var(--paper-line); flex:0 0 60px; margin-top:7px; overflow:hidden; position:relative;}
  .trait .bar i{position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg,var(--gold),var(--gold-deep)); border-radius:4px;}

  .scores{display:flex; justify-content:space-around; gap:8px; margin:6px auto 0; max-width:380px;}
  .score{flex:1; background:rgba(201,162,39,.10); border:1px solid var(--paper-line); border-radius:10px; padding:10px 4px;}
  .score .sv{font-size:23px; font-weight:700; color:var(--red);}
  .score .sk{font-size:12px; color:var(--ink-soft); letter-spacing:.1em; margin-top:2px;}

  .gate{margin:16px auto 0; max-width:380px; text-align:left; font-size:14px; line-height:1.7;}
  .gate .gk{color:var(--gold-deep); font-weight:700; letter-spacing:.1em;}
  .verse{margin:14px auto 0; max-width:380px; background:rgba(201,162,39,.10); border:1px solid var(--paper-line); border-radius:10px; padding:15px 18px; font-size:15px; line-height:2; color:var(--ink); text-align:left;}
  .verse .vt{color:var(--red); font-weight:700; letter-spacing:.2em; font-size:13px; display:block; margin-bottom:6px;}

  footer{margin-top:30px; color:#f0d89e; opacity:.6; font-size:12px; line-height:1.9; text-align:center; max-width:480px;}
  .err{color:#ffd9a8; font-size:13px; margin-top:10px; min-height:18px;}

  @media(max-width:480px){h1{font-size:24px;} .viewer{width:88vw; height:106vw; max-width:300px; max-height:360px;}}
</style>
</head>
<body>
<div class="bg-orbs" id="orbs"></div>

<div class="wrap">
  <header>
    <div class="temple">寶 嚴 禪 寺</div>
    <h1>善財童子五十三參
      <span class="sm">面 相 觀 照 ． 善 知 識 相 應</span>
    </h1>
    <p class="subtitle">
      善財童子遍訪五十三位善知識，學菩薩萬行。<br>
      請以鏡頭觀照或上傳照片，依面相三停五官之氣象，<br>與一位善知識相應，得其法門指引。
    </p>
    <a class="back-link" href="index.html">↩ 返回「抽籤」· 善知識卡</a>
  </header>

  <div class="viewer" id="viewer">
    <video id="video" playsinline muted></video>
    <canvas class="shot" id="shot"></canvas>
    <div class="placeholder">
      <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="32" cy="26" r="14"/>
        <path d="M12 54c2-9 10-14 20-14s18 5 20 14"/>
        <path d="M26 24c1.5 1.5 4.5 1.5 6 0M38 24c1.5 1.5 4.5 1.5 6 0" stroke-width="2.4"/>
      </svg>
      <p>開啟鏡頭，或上傳一張正面清晰的相片<br>讓善知識為您觀照面相</p>
    </div>
    <!-- 三停五嶽導引線 -->
    <svg class="guide" id="guide" viewBox="0 0 300 360" preserveAspectRatio="none">
      <ellipse cx="150" cy="180" rx="92" ry="120"/>
      <line x1="58" y1="120" x2="242" y2="120"/>
      <line x1="58" y1="210" x2="242" y2="210"/>
      <line x1="150" y1="60" x2="150" y2="300"/>
      <circle cx="150" cy="150" r="5"/>
      <circle cx="105" cy="150" r="4"/><circle cx="195" cy="150" r="4"/>
      <circle cx="150" cy="240" r="5"/>
      <text class="lbl" x="246" y="92">上停 · 智</text>
      <text class="lbl" x="246" y="170">中停 · 業</text>
      <text class="lbl" x="246" y="262">下停 · 福</text>
    </svg>
    <div class="scan"></div>
  </div>
  <div class="analyzing-tip" id="aTip">善知識凝神觀照中…請稍候</div>
  <div class="err" id="err"></div>

  <div class="actions" id="setupActions">
    <button class="btn" id="camBtn">開啟鏡頭</button>
    <button class="btn ghost" id="uploadBtn">上傳照片</button>
    <input type="file" id="file" accept="image/*" capture="user" style="display:none;">
  </div>
  <div class="actions" id="goActions" style="display:none;">
    <button class="btn big" id="readBtn">觀　照　面　相</button>
    <button class="btn ghost" id="resetBtn">重新選擇</button>
  </div>

  <div class="card-scene" id="scene"></div>

  <div class="actions" id="againActions" style="display:none; margin-top:18px;">
    <button class="btn ghost" id="againBtn">再觀照一次</button>
  </div>

  <footer>
    本程式依《大方廣佛華嚴經‧入法界品》五十三參與傳統面相「三停五官」之說編成，<br>
    為勸善、省思之方便遊戲，非命理斷定，亦不蒐集或上傳您的影像（全程於本機運算）。<br>
    © 寶嚴禪寺　Baoyan Chan Monastery
  </footer>
</div>

<script>
/* ============ 五十三參資料 ============ */
const SIGNS = [
 {n:1,name:"德雲比丘",role:"勝樂國 妙峰山",gate:"憶念一切諸佛境界智慧光明普見法門（念佛）",msg:"心中常存光明的念頭，便能照見前路。把握當下每一份善念，諸事自有轉機。"},
 {n:2,name:"海雲比丘",role:"海門國",gate:"諸佛菩薩行光明普門法門",msg:"以寬廣如海的胸懷面對眼前人事，包容能化解一切阻礙。"},
 {n:3,name:"善住比丘",role:"楞伽道邊 海岸聚落",gate:"普速疾供養諸佛成就眾生無礙解脫門",msg:"腳步穩健、心無罣礙，你正走在對的道路上，繼續前行勿疑。"},
 {n:4,name:"彌伽長者",role:"達里鼻荼國 自在城",gate:"妙音陀羅尼．輪字莊嚴",msg:"真誠的言語最動人。多用善言鼓勵他人，福報自然回到你身上。"},
 {n:5,name:"解脫長者",role:"住林聚落",gate:"如來無礙莊嚴解脫門",msg:"放下執著，便得自在。困住你的往往不是外境，而是不肯鬆手的心。"},
 {n:6,name:"海幢比丘",role:"閻浮提畔 摩利伽羅國",gate:"般若波羅蜜三昧光明",msg:"靜下心來，智慧自現。遇事不急著反應，沉澱後再決定。"},
 {n:7,name:"休捨優婆夷",role:"海潮處 普莊嚴園",gate:"離憂安隱幢解脫門",msg:"憂愁無益於事，安住於當下。你所擔心的，多半不會發生。"},
 {n:8,name:"毗目瞿沙仙人",role:"那羅素國",gate:"菩薩無勝幢解脫",msg:"堅定你的志向，不為他人動搖。你的方向是正確的。"},
 {n:9,name:"勝熱婆羅門",role:"伊沙那聚落",gate:"菩薩無盡輪解脫",msg:"真正的考驗能淬鍊出真金。眼前的艱難，是成長的階梯。"},
 {n:10,name:"慈行童女",role:"師子奮迅城",gate:"般若波羅蜜普莊嚴門",msg:"以慈悲待人、以智慧處事，柔和的力量能成就大事。"},
 {n:11,name:"善見比丘",role:"三眼國",gate:"菩薩隨順燈解脫",msg:"明辨是非、順應因緣。看清方向後，順勢而為最省力。"},
 {n:12,name:"自在主童子",role:"名聞國 河渚中",gate:"一切工巧大神通智光明法門（算數）",msg:"凡事講求方法與條理，按部就班，繁雜之事也能迎刃而解。"},
 {n:13,name:"具足優婆夷",role:"海住城",gate:"菩薩無盡福德藏解脫",msg:"樂於分享者永不匱乏。你的給予，將化為源源不絕的福報。"},
 {n:14,name:"明智居士",role:"大興城",gate:"隨意出生福德藏解脫",msg:"智慧與善心並用，所求皆能如願，但莫忘初衷。"},
 {n:15,name:"法寶髻長者",role:"師子宮城",gate:"菩薩無量福德寶藏解脫",msg:"累積善行如積寶藏，平日的努力終將顯現成果。"},
 {n:16,name:"普眼長者",role:"普門國（藤根國）",gate:"令一切眾生普見諸佛歡喜法門（醫方香法）",msg:"關懷他人的需要，療癒別人也療癒了自己。"},
 {n:17,name:"無厭足王",role:"多羅幢城",gate:"菩薩如幻解脫（示現方便）",msg:"嚴正不等於無情。必要時的堅持與原則，是為了更大的善。"},
 {n:18,name:"大光王",role:"妙光城",gate:"菩薩大慈為首隨順世間三昧門",msg:"以慈悲領眾、以德服人。你的善意正在影響周遭。"},
 {n:19,name:"不動優婆夷",role:"安住王都",gate:"求一切法無厭足三昧",msg:"保持初學者的謙卑與熱忱，不斷學習者永遠年輕。"},
 {n:20,name:"遍行外道",role:"都薩羅城 善德山",gate:"至一切處菩薩行（無依無作神通力）",msg:"廣結善緣，何處都能修行。放開心胸接納不同的人。"},
 {n:21,name:"鬻香長者",role:"廣大國",gate:"善別一切諸香法門",msg:"細細品味生活、分辨輕重緩急，你已具備過人的眼光。"},
 {n:22,name:"婆施羅船師",role:"樓閣城",gate:"大悲幢行",msg:"人生如航海，掌穩你的舵。風浪過後便是彼岸。"},
 {n:23,name:"無上勝長者",role:"可樂城",gate:"至一切處修菩薩行清淨法門",msg:"不依賴外境，內心自有依止。你比想像中更有力量。"},
 {n:24,name:"師子頻申比丘尼",role:"輸那國 迦陵迦林城",gate:"成就一切智解脫",msg:"無畏如獅，自信展現你的才能，機會正等著你。"},
 {n:25,name:"婆須蜜多女",role:"險難國 寶莊嚴城",gate:"離貪欲際解脫（善巧度生）",msg:"以善巧化解煩惱，懂得轉念，即是解脫之道。"},
 {n:26,name:"鞞瑟胝羅居士",role:"善度城",gate:"不般涅槃際解脫",msg:"珍惜當下的緣分，用心相待，莫待失去才懂珍惜。"},
 {n:27,name:"觀自在菩薩",role:"補怛洛迦山",gate:"大悲行解脫門",msg:"觀照自心、慈悲待人。所求之事，菩薩聞聲必應，誠則靈。"},
 {n:28,name:"正趣菩薩",role:"自東方來",gate:"普門速疾行解脫",msg:"把握時機，當行則行。猶豫不決會錯失良緣。"},
 {n:29,name:"大天神",role:"墮羅鉢底城",gate:"雲網解脫",msg:"順應變化、廣施善法。靈活應變者能成大局。"},
 {n:30,name:"安住地神",role:"摩竭提國 菩提場",gate:"不可壞智慧藏法門",msg:"腳踏實地、根基穩固。沉穩踏實終能守得雲開見月明。"},
 {n:31,name:"婆珊婆演底主夜神",role:"迦毗羅城",gate:"破一切眾生闇法光明解脫",msg:"黑暗終將過去，你就是照亮自己與他人的那盞燈。"},
 {n:32,name:"普德淨光主夜神",role:"菩提場右",gate:"寂靜禪定樂普遊步解脫",msg:"於喧鬧中保持內心的寧靜，定力是你最大的資產。"},
 {n:33,name:"喜目觀察眾生主夜神",role:"菩提場",gate:"大勢力普喜幢解脫",msg:"以歡喜心看世界，處處是順緣。保持樂觀，好運自來。"},
 {n:34,name:"普救眾生妙德主夜神",role:"菩提場",gate:"普現一切世間調伏眾生解脫",msg:"助人於危難，你的善行終將回饋自身。"},
 {n:35,name:"寂靜音海主夜神",role:"菩提場",gate:"念念出生廣大喜莊嚴解脫",msg:"常生歡喜、廣積喜緣。心安處即是福地。"},

/* ============ DOM ============ */
const viewer=document.getElementById("viewer");
const video=document.getElementById("video");
const shot=document.getElementById("shot");
const fileInput=document.getElementById("file");
const camBtn=document.getElementById("camBtn");
const uploadBtn=document.getElementById("uploadBtn");
const readBtn=document.getElementById("readBtn");
const resetBtn=document.getElementById("resetBtn");
const againBtn=document.getElementById("againBtn");
const setupActions=document.getElementById("setupActions");
const goActions=document.getElementById("goActions");
const againActions=document.getElementById("againActions");
const scene=document.getElementById("scene");
const errEl=document.getElementById("err");
const aTip=document.getElementById("aTip");

let stream=null;       // 鏡頭串流
let mode=null;         // 'cam' | 'shot'
let uploadedImg=null;  // 上傳的 Image 物件

function setErr(m){ errEl.textContent=m||""; }

/* ---- 開啟鏡頭 ---- */
async function openCam(){
  setErr("");
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user", width:{ideal:640}, height:{ideal:640}}, audio:false});
    video.srcObject=stream;
    await video.play();
    mode="cam";
    viewer.className="viewer cam";
    setupActions.style.display="none";
    goActions.style.display="flex";
    scene.classList.remove("show");
    againActions.style.display="none";
  }catch(e){
    setErr("無法開啟鏡頭（請改用「上傳照片」，或允許瀏覽器使用相機）。");
  }
}

/* ---- 上傳照片 ---- */
uploadBtn.addEventListener("click",()=>fileInput.click());
fileInput.addEventListener("change",e=>{
  const f=e.target.files&&e.target.files[0];
  if(!f) return;
  setErr("");
  const url=URL.createObjectURL(f);
  const img=new Image();
  img.onload=()=>{
    uploadedImg=img;
    drawToShot(img);
    mode="shot";
    viewer.className="viewer shot";
    stopCam();
    setupActions.style.display="none";
    goActions.style.display="flex";
    scene.classList.remove("show");
    againActions.style.display="none";
    URL.revokeObjectURL(url);
  };
  img.onerror=()=>{ setErr("照片讀取失敗，請換一張試試。"); URL.revokeObjectURL(url); };
  img.src=url;
});

/* 把來源（圖片）以 cover 方式置中繪到 shot canvas */
function drawToShot(src){
  const W=300,H=360;
  shot.width=W; shot.height=H;
  const c=shot.getContext("2d");
  const sw=src.naturalWidth||src.videoWidth, sh=src.naturalHeight||src.videoHeight;
  const scale=Math.max(W/sw,H/sh);
  const dw=sw*scale, dh=sh*scale;
  c.drawImage(src,(W-dw)/2,(H-dh)/2,dw,dh);
}

function stopCam(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
}

/* ---- 重置 ---- */
function resetAll(){
  stopCam();
  mode=null; uploadedImg=null;
  viewer.className="viewer";
  setupActions.style.display="flex";
  goActions.style.display="none";
  againActions.style.display="none";
  scene.classList.remove("show");
  setErr("");
}

/* ============ 影像特徵分析 ============ */
function grabSourceCanvas(){
  // 取得目前畫面（鏡頭即時擷取 / 已上傳）到 shot canvas
  if(mode==="cam"){ drawToShot(video); }
  return shot;
}

function analyzeFace(canvas){
  const W=canvas.width, H=canvas.height;
  const ctx=canvas.getContext("2d");
  // 取臉部約略區域：中央 64% 寬、80% 高
  const fx=Math.round(W*0.18), fy=Math.round(H*0.10);
  const fw=Math.round(W*0.64), fh=Math.round(H*0.80);
  const data=ctx.getImageData(fx,fy,fw,fh).data;

  let lum=[0,0,0], cnt=[0,0,0];      // 三停亮度（上中下）
  let sumR=0,sumG=0,sumB=0,sumL=0,sumL2=0,N=0;
  let leftL=0,leftN=0,rightL=0,rightN=0;
  let hash=2166136261>>>0;

  for(let y=0;y<fh;y++){
    const band = y< fh/3 ? 0 : (y< fh*2/3 ? 1 : 2);
    for(let x=0;x<fw;x++){
      const i=(y*fw+x)*4;
      const r=data[i],g=data[i+1],b=data[i+2];
      const L=0.299*r+0.587*g+0.114*b;
      lum[band]+=L; cnt[band]++;
      sumR+=r; sumG+=g; sumB+=b; sumL+=L; sumL2+=L*L; N++;
      if(x<fw/2){ leftL+=L; leftN++; } else { rightL+=L; rightN++; }
      // 取樣雜湊（每隔數像素），讓同一張臉得到穩定結果
      if((x%7===0)&&(y%7===0)){
        hash ^= (r&0xF8)|((g&0xF8)<<8)|((b&0xF8)<<16);
        hash = Math.imul(hash,16777619)>>>0;
      }
    }
  }
  const avgL=sumL/N;
  const u=lum[0]/cnt[0], m=lum[1]/cnt[1], d=lum[2]/cnt[2];
  const std=Math.sqrt(Math.max(0,sumL2/N-avgL*avgL));
  const warmth=(sumR-sumB)/N;                       // 紅潤度
  const sym=1-Math.min(1,Math.abs(leftL/leftN-rightL/rightN)/Math.max(1,avgL)); // 0~1 對稱度

  // 偵測是否像有效照片（過暗、過曝、或近乎全黑）
  const valid = N>0 && avgL>14 && avgL<248 && std>6;

  return {avgL,u,m,d,std,warmth,sym,hash:hash>>>0,valid};
}

/* 把數值轉成 low/mid/high 等級 */
function tier(v,lo,hi){ return v<lo?"low":(v>hi?"high":"mid"); }
function pct(level){ return level==="high"?86:(level==="mid"?60:38); }

function buildReport(f){
  // 三停相對強弱
  const stops={上停:f.u,中停:f.m,下停:f.d};
  const maxStop=Object.keys(stops).reduce((a,b)=>stops[a]>=stops[b]?a:b);
  // 各維度等級
  const lv={
    上停:tier(f.u,f.avgL-10,f.avgL+10),
    中停:tier(f.m,f.avgL-10,f.avgL+10),
    下停:tier(f.d,f.avgL-10,f.avgL+10),
    氣色:tier(f.warmth,18,40),
    神采:tier(f.std,34,52),
    端正:tier(f.sym,0.86,0.95)
  };
  // 福德／智慧／事業 三項指數（60~98，偏吉）
  const clamp=(x)=>Math.max(58,Math.min(98,Math.round(x)));
  const wisdom = clamp(62 + (f.u-f.avgL)*1.2 + (f.std-40)*0.4 + (f.hash%7));
  const career = clamp(62 + (f.m-f.avgL)*1.2 + (f.warmth-28)*0.5 + (f.hash%5));
  const fortune= clamp(64 + (f.d-f.avgL)*1.2 + f.sym*14 + (f.hash%6));

  // 與善知識相應（以穩定雜湊決定，同一張臉結果一致）
  const sign=SIGNS[f.hash % SIGNS.length];

  return {lv,maxStop,wisdom,career,fortune,sign};
}

/* ============ 觀照流程 ============ */
function read(){
  if(!mode){ setErr("請先開啟鏡頭或上傳照片。"); return; }
  setErr("");
  const canvas=grabSourceCanvas();   // 定格目前畫面
  // 若是鏡頭，定格後切到 shot 顯示
  if(mode==="cam"){ stopCam(); mode="shot"; }
  viewer.className="viewer shot analyzing";
  aTip.classList.add("show");
  goActions.style.display="none";

  setTimeout(()=>{
    const f=analyzeFace(canvas);
    viewer.className="viewer shot";
    aTip.classList.remove("show");
    if(!f.valid){
      setErr("畫面太暗或看不清面容，請在光線充足處、正面清晰再試一次。");
      goActions.style.display="flex";
      viewer.className="viewer shot";
      return;
    }
    const rep=buildReport(f);
    showResult(rep,canvas);
    againActions.style.display="flex";
  }, 1800);
}

function bar(level){ return `<span class="bar"><i style="width:${pct(level)}%"></i></span>`; }

function showResult(rep,canvas){
  const s=rep.sign;
  const faceURL=canvas.toDataURL("image/jpeg",0.8);
  const traits=["上停","中停","下停","氣色","神采","端正"];
  const traitHTML=traits.map(k=>{
    const lv=rep.lv[k];
    return `<div class="trait"><span class="t-k">${k}</span><span class="t-v">${READINGS[k][lv]}</span>${bar(lv)}</div>`;
  }).join("");

  scene.innerHTML=`
    <div class="card">
      <div class="badge">面相觀照</div>
      <div class="no">與第 <b>${s.n}</b> 參善知識相應　／　共五十三參</div>
      <div class="face-shot"><img src="${faceURL}" alt="面相"></div>
      <div class="name">${s.name}</div>
      <div class="role">參訪：${s.role}</div>

      <div class="scores">
        <div class="score"><div class="sv">${rep.wisdom}</div><div class="sk">智慧</div></div>
        <div class="score"><div class="sv">${rep.career}</div><div class="sk">事業</div></div>
        <div class="score"><div class="sv">${rep.fortune}</div><div class="sk">福德</div></div>
      </div>

      <div class="section">
        <h3>面　相　觀　照</h3>
        ${traitHTML}
        <div class="trait" style="margin-top:4px"><span class="t-k">總評</span><span class="t-v">${STOP_FOCUS[rep.maxStop]}</span></div>
      </div>

      <div class="gate"><span class="gk">所應法門　</span>${s.gate}</div>

      <div class="verse">
        <span class="vt">善知識開示</span>
        ${s.msg}
      </div>
    </div>`;
  scene.classList.add("show");
  scene.scrollIntoView({behavior:"smooth",block:"nearest"});
}
