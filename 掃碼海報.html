<style>
  :root{ --navy:#10173c; --gold:#be9a32; --gold-light:#d8b24a; --paper:#f7f0e1; --ink:#2b211a; }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:#3a2f22;}
  body{font-family:"Noto Serif TC","Songti TC","STSong","PMingLiU",serif; display:flex; justify-content:center; padding:24px;}
  .poster{
    width:520px; background:var(--paper); color:var(--ink); text-align:center;
    padding:40px 38px 34px; border-radius:10px; position:relative;
    box-shadow:0 18px 50px rgba(0,0,0,.45);
    border:2px solid var(--gold);
    outline:6px solid var(--paper); outline-offset:-12px;
  }
  .poster::before{content:""; position:absolute; inset:9px; border:1px solid var(--gold); border-radius:6px; pointer-events:none; opacity:.6;}
  .temple{color:var(--navy); letter-spacing:.5em; text-indent:.5em; font-size:17px; margin-bottom:18px; font-weight:700;}
  h1{color:var(--navy); font-size:34px; font-weight:700; line-height:1.4; letter-spacing:.04em;}
  .sub{display:inline-block; margin-top:14px; color:#7a5; color:var(--gold); font-size:17px; letter-spacing:.34em; text-indent:.34em; font-weight:700;
       border-top:1px solid var(--gold); border-bottom:1px solid var(--gold); padding:7px 4px;}
  .qbox{margin:26px auto 14px; width:300px; height:300px; padding:14px; background:#fff; border:2px solid var(--gold); border-radius:12px; box-shadow:0 6px 16px rgba(0,0,0,.12);}
  .qbox img{width:100%; height:100%; display:block; image-rendering:pixelated;}
  .scan{color:var(--navy); font-size:18px; font-weight:700; letter-spacing:.12em; margin-top:6px;}
  .desc{color:#5c4d3d; font-size:14px; line-height:1.9; margin-top:12px;}
  .url{margin-top:16px; font-size:12.5px; color:#8a7a63; word-break:break-all; letter-spacing:.02em;
       background:rgba(190,154,50,.1); border:1px dashed var(--gold); border-radius:8px; padding:9px 12px;}
  .foot{margin-top:18px; color:#8a7a63; font-size:11.5px; letter-spacing:.08em;}
  .hint{margin:18px auto 0; max-width:520px; color:#d8c39a; font-size:12.5px; text-align:center; line-height:1.8;}
  @media print{
    html,body{background:#fff; padding:0;}
    .poster{box-shadow:none; margin:0 auto;}
    .hint{display:none;}
    @page{ margin:14mm; }
  }
</style>
</head>
